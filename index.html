<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexor | Gestão e Organização</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030303;
      --surface: #0a0a0b;
      --surface-2: #141416;
      --text: #f7f7f3;
      --muted: #9d9d9a;
      --line: #2a2a2d;
      --accent: #ffffff;
      --accent-2: #bfc3c9;
      --gold: #d8b45f;
      --danger: #ff6b6b;
      --warning: #dda85a;
      --success: #72d49a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
      --page-base: #030303;
      --page-top: #000000;
      --page-bottom: #080808;
      --grid-line: rgba(255,255,255,0.025);
      --auth-base: #000000;
      --auth-card-bg: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
      --glass-border: rgba(255,255,255,0.16);
      --sidebar-bg: color-mix(in srgb, #050505 88%, transparent);
      --logo-shadow: drop-shadow(0 0 26px rgba(255,255,255,0.14));
      --radius: 8px;
      --sidebar: 280px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f3f3f0;
      --surface: #ffffff;
      --surface-2: #ececea;
      --text: #0a0a0a;
      --muted: #676764;
      --line: #d8d8d2;
      --accent: #0a0a0a;
      --accent-2: #565b63;
      --gold: #a77b28;
      --danger: #b64242;
      --warning: #b97818;
      --success: #26835b;
      --shadow: 0 20px 55px rgba(10, 10, 10, 0.1);
      --page-base: #f3f3f0;
      --page-top: #ffffff;
      --page-bottom: #e8e8e3;
      --grid-line: rgba(0,0,0,0.035);
      --auth-base: #f3f3f0;
      --auth-card-bg: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,245,242,0.9));
      --glass-border: rgba(0,0,0,0.14);
      --sidebar-bg: color-mix(in srgb, #ffffff 88%, transparent);
      --logo-shadow: drop-shadow(0 0 18px rgba(0,0,0,0.16));
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, var(--page-top) 0%, var(--page-base) 48%, var(--page-bottom) 100%),
        repeating-linear-gradient(90deg, var(--grid-line) 0 1px, transparent 1px 96px),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .auth-view {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: #000;
    }

    .auth-card {
      width: min(440px, 100%);
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 28px clamp(18px, 4vw, 34px);
      backdrop-filter: none;
    }

    .auth-card::before {
      display: none;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .brand-mark img {
      width: 76%;
      height: 76%;
      object-fit: contain;
      filter: var(--logo-shadow);
    }

    .auth-logo {
      display: block;
      width: min(400px, 92%);
      margin: 0 auto 34px;
      filter: var(--logo-shadow);
      animation: logoFloat 6s ease-in-out infinite, logoFocus 4.8s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.018); }
    }

    @keyframes logoFocus {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; }
    }

    @keyframes panelSweep {
      0%, 62% { transform: translateX(-120%); opacity: 0; }
      72% { opacity: 0.72; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    .auth-card h1,
    .module-title h1 {
      margin: 18px 0 8px;
      font-size: clamp(1.65rem, 3vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .auth-card p,
    .module-title p,
    .muted {
      color: var(--muted);
    }

    .auth-view .auth-card p {
      margin: 0 0 22px;
      color: #a8a8a4;
    }

    .auth-view .field label {
      color: #b8b8b4;
    }

    .auth-view input {
      background: #050505;
      border-color: #2a2a2d;
      color: #ffffff;
    }

    .auth-view input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.12);
    }

    .auth-view .btn.primary {
      background: #ffffff;
      border-color: #ffffff;
      color: #050505;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-top: 14px;
    }

    .field label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      color: var(--text);
      border-radius: var(--radius);
      padding: 11px 12px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 72%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent);
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      color: var(--text);
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 92%, white 4%), var(--surface));
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 56%, var(--line));
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .btn.primary {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    .btn.accent {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .btn.danger {
      border-color: color-mix(in srgb, var(--danger) 35%, var(--line));
      color: var(--danger);
    }

    .btn.icon {
      width: 40px;
      padding: 0;
    }

    .auth-actions,
    .toolbar,
    .row-actions,
    .modal-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .auth-actions {
      margin-top: 18px;
    }

    .auth-error {
      min-height: 22px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 0.9rem;
    }

    .save-notice {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--success) 34%, var(--line));
      border-radius: 8px;
      color: var(--success);
      background: color-mix(in srgb, var(--success) 9%, transparent);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
    }

    .sidebar {
      position: relative;
      top: auto;
      height: auto;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--sidebar-bg);
      backdrop-filter: blur(18px);
      padding: 18px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand strong {
      display: block;
      font-size: 1.25rem;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .nav {
      display: grid;
      gap: 5px;
      margin: 18px 0;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 11px;
      border-radius: var(--radius);
      text-align: left;
      transition: background 150ms ease, color 150ms ease;
    }

    .nav button:hover,
    .nav button.active {
      color: var(--text);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 9%, transparent), color-mix(in srgb, var(--accent) 3%, transparent));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 8%, transparent);
    }

    .nav svg,
    .btn svg,
    .chip svg,
    .search-hit svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.9;
      flex: 0 0 auto;
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .user-pill {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--bg);
      background: linear-gradient(145deg, var(--text), var(--accent-2));
      font-weight: 800;
      text-transform: uppercase;
    }

    .user-pill strong,
    .user-pill span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .user-pill span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .content {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      padding-left: 42px;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      z-index: 20;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      max-height: 340px;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
    }

    .search-hit {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: var(--radius);
    }

    .search-hit:hover {
      background: var(--surface-2);
    }

    .module-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 18px;
    }

    .module-title h1 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .grid.two {
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel,
    .metric,
    .item-card,
    .kanban-column,
    .day-column,
    .quadrant,
    .table-wrap {
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 94%, white 3%), color-mix(in srgb, var(--surface) 96%, transparent));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .panel {
      padding: 16px;
    }

    .module-head,
    .panel,
    .metric,
    .item-card,
    .kanban-column,
    .day-column,
    .quadrant,
    .table-wrap,
    .mini-board {
      animation: softReveal 360ms ease both;
    }

    .panel:hover,
    .metric:hover,
    .item-card:hover,
    .mini-board:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 26%, var(--line));
    }

    @keyframes softReveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .metric {
      padding: 15px;
      display: grid;
      gap: 7px;
      min-height: 116px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
    }

    .metric .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .metric strong {
      font-size: clamp(1.55rem, 2vw, 2.05rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .metric small {
      color: var(--muted);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2,
    .section-title h3 {
      margin: 0;
      font-size: 1rem;
    }

    .list {
      display: grid;
      gap: 9px;
    }

    .list-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .list-row:last-child {
      border-bottom: 0;
    }

    .list-row strong,
    .item-card strong {
      display: block;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-2) 78%, transparent);
      color: var(--text);
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .chip.accent {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-color: color-mix(in srgb, var(--accent) 28%, var(--line));
    }

    .chip.gold {
      color: var(--gold);
      background: color-mix(in srgb, var(--gold) 12%, transparent);
      border-color: color-mix(in srgb, var(--gold) 30%, var(--line));
    }

    .chip.danger {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 11%, transparent);
      border-color: color-mix(in srgb, var(--danger) 28%, var(--line));
    }

    .chip.success {
      color: var(--success);
      background: color-mix(in srgb, var(--success) 12%, transparent);
      border-color: color-mix(in srgb, var(--success) 28%, var(--line));
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
    }

    .progress span {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
    }

    .item-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .item-card.draggable {
      cursor: grab;
    }

    .item-card.draggable:active {
      cursor: grabbing;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .card-head strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .quick-grid .btn {
      min-height: 54px;
      justify-content: flex-start;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
      background: color-mix(in srgb, var(--surface-2) 62%, transparent);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .kanban-board,
    .planner-board {
      display: grid;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .kanban-board {
      grid-template-columns: repeat(7, minmax(240px, 1fr));
    }

    .planner-board {
      grid-template-columns: repeat(7, minmax(210px, 1fr));
    }

    .kanban-column,
    .day-column,
    .quadrant {
      padding: 12px;
      min-height: 420px;
    }

    .kanban-column.drag-over,
    .day-column.drag-over,
    .quadrant.drag-over {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 7%, var(--surface));
    }

    .column-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .column-head h3 {
      margin: 0;
      font-size: 0.92rem;
    }

    .column-list {
      display: grid;
      gap: 10px;
      min-height: 320px;
      align-content: start;
    }

    .eisenhower-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .quadrant {
      min-height: 320px;
    }

    .quadrant h3 {
      margin: 0 0 4px;
    }

    .bar-chart {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr) 72px;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .bar-track {
      height: 11px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .bar-track span {
      display: block;
      height: 100%;
      width: var(--value);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }

    .form-grid .wide {
      grid-column: 1 / -1;
    }

    dialog {
      width: min(760px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(10, 12, 10, 0.48);
      backdrop-filter: blur(5px);
    }

    .modal {
      padding: 18px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .modal-head h2 {
      margin: 0;
    }

    .modal-actions {
      margin-top: 16px;
      justify-content: flex-end;
    }

    .empty {
      display: grid;
      gap: 10px;
      place-items: center;
      min-height: 190px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 22px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(360px, 1.2fr);
      gap: 14px;
    }

    .notification-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      display: inline-block;
      margin-left: -9px;
      margin-top: -14px;
      border: 2px solid var(--surface);
    }

    .check-only {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
      color: var(--accent);

      line-height: 1;
      font-weight: 800;

    .check-action {

    .motion-card {
      position: relative;
      overflow: hidden;

    .motion-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 34%);
      opacity: 0.42;

    .minimal-chart {
      width: 100%;
      min-height: 150px;
      display: grid;
      align-items: end;
    }

    .minimal-chart svg {
      width: 100%;
      height: 150px;
      overflow: visible;
    }

    .minimal-chart .axis {
      stroke: color-mix(in srgb, var(--muted) 28%, transparent);
      stroke-dasharray: 2 5;
      stroke-width: 1;
    }

    .minimal-chart .line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.2;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 22%, transparent));
      animation: traceLine 1.15s ease both;

    .minimal-chart .dot {
      fill: var(--surface);
      stroke: var(--accent);
      stroke-width: 2;

    .minimal-chart .hover-dot {
      fill: transparent;
      stroke: transparent;
      cursor: crosshair;
      pointer-events: all;
    }

    .minimal-chart [data-chart-tip]:hover .dot,
    .minimal-chart [data-chart-tip]:focus .dot {
      fill: var(--accent);
      filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent) 42%, transparent));
    }

    .minimal-chart text {
      fill: var(--text);
      font-size: 11px;
    }

    [data-chart-tip] {
      cursor: help;
    }

    .chart-tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-50%, -112%, 0) scale(0.98);
      min-width: 132px;
      max-width: 260px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      color: var(--text);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .chart-tooltip.visible {
      opacity: 1;
      transform: translate3d(-50%, -122%, 0) scale(1);

    .chart-tooltip strong {

      font-size: 0.88rem;
      margin-bottom: 4px;

    .chart-tooltip span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    @keyframes traceLine {

    .dot.red { background: #ff4141; }

    .habit-title h2 {
      margin: 0;

    .habit-days-head,

      display: grid;

      color: var(--muted);

    .habit-mini-bar span {

    .planner-shell {

      border-right: 1px solid color-mix(in srgb, var(--line) 72%, transparent);

    .finance-hero {
      text-align: center;
      padding: 20px 0 34px;
    }

    .finance-hero h2 {
      margin: 8px auto 12px;

    .budget-list {

      min-height: 44px;
      width: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid color-mix(in srgb, var(--tab-accent) 22%, rgba(255,255,255,0.09));
      border-radius: 12px;
      padding: 0 12px;
      color: rgba(255,255,255,0.82);
      background:
        radial-gradient(circle at 18% 0%, color-mix(in srgb, var(--tab-accent) 14%, transparent), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.016)),

      font-size: 0.78rem;

      iconTargets.forEach(el => {
        if (!Object.prototype.hasOwnProperty.call(el.dataset, "iconLabel")) {
          el.dataset.iconLabel = el.innerHTML;
        }
        if (el.dataset.iconApplied === el.dataset.icon) return;
        el.innerHTML = `${icon(el.dataset.icon)}${el.dataset.iconLabel}`;

    function addDays(days) {
      const date = new Date();
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function loadDb() {
      const key = dbKey(currentUser.id);
      const stored = localStorage.getItem(key);
      if (stored) {
        db = JSON.parse(stored);
      } else {
        db = createDefaultDb(currentUser.email === ADMIN_EMAIL);
        localStorage.setItem(key, JSON.stringify(db));
      }
      db.tasks ||= [];
      db.projects ||= [];
      db.clients ||= [];
      db.finance ||= [];
      db.productions ||= [];
      db.habits ||= [];
      db.team ||= [];
      db.activity ||= [];
      db.calendar ||= { googleClientId: "", connected: false, lastSync: "" };
      if (db.brandVersion !== "nexor-motion-v2") {
        db.theme = "dark";
        db.brandVersion = "nexor-motion-v2";
        localStorage.setItem(dbKey(currentUser.id), JSON.stringify(db));
      }
    }

    function saveDb() {
      localStorage.setItem(dbKey(currentUser.id), JSON.stringify(db));
      updateNotificationDot();
    }

    function logActivity(label) {
      db.activity.unshift({ id: uid("act"), label, date: today() });
      db.activity = db.activity.slice(0, 60);
    }

    function canAccess(moduleId) {
      return Boolean(currentUser);
    }

    function boot() {
      loadUsers();
      applyIcons();
      $("#loginForm").addEventListener("submit", handleLogin);
      $("#logoutBtn").addEventListener("click", logout);
      $("#themeBtn").addEventListener("click", toggleTheme);
      $("#notifyBtn").addEventListener("click", () => {
        activeModule = "dashboard";
        db.notificationsReadAt = new Date().toISOString();
        saveDb();
        renderApp();
      });
      $("#globalSearch").addEventListener("input", renderSearch);
      document.addEventListener("click", event => {
        const open = event.target.closest("[data-open]");
        if (open) openModal(open.dataset.open);
        if (!event.target.closest(".search-wrap")) $("#searchResults").classList.add("hidden");
      });
      const sessionId = localStorage.getItem(SESSION_KEY);
      if (sessionId) {
        const user = users.find(item => item.id === sessionId && item.status !== "Inativo");
        if (user) startSession(user);
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const email = $("#email").value.trim().toLowerCase();
      const password = $("#password").value;
      const passwordHash = await sha256(password);
      const user = users.find(item => item.email.toLowerCase() === email && item.status !== "Inativo");
      if (!user || user.passwordHash !== passwordHash) {
        $("#authError").textContent = "E-mail ou senha inválidos.";
        return;
      }
      user.lastLogin = today();
      saveUsers();
      localStorage.setItem(SESSION_KEY, user.id);
      startSession(user);
    }

    function startSession(user) {
      currentUser = user;
      loadDb();
      document.body.dataset.theme = db.theme || "light";
      $("#authView").classList.add("hidden");
      $("#appShell").classList.remove("hidden");
      activeModule = canAccess(activeModule) ? activeModule : "dashboard";
      renderApp();
    }

    function logout() {
      localStorage.removeItem(SESSION_KEY);
      currentUser = null;
      db = null;
      $("#appShell").classList.add("hidden");
      $("#authView").classList.remove("hidden");
      $("#password").value = "";
      $("#authError").textContent = "";
    }

    function renderApp() {
      renderNav();
      renderUser();
      renderModule();
      updateNotificationDot();
      $("#topTaskBtn").classList.toggle("hidden", !canManage());
      $("#themeBtn").dataset.icon = document.body.dataset.theme === "dark" ? "sun" : "moon";
      $("#themeBtn").title = document.body.dataset.theme === "dark" ? "Mudar para tema claro" : "Mudar para tema escuro";
      $("#themeBtn").setAttribute("aria-label", $("#themeBtn").title);
      applyIcons($("#themeBtn"));
    }

    function renderNav() {
      $("#nav").innerHTML = modules
        .filter(([id]) => canAccess(id))
        .map(([id, label, iconName]) => `<button type="button" class="${activeModule === id ? "active" : ""}" data-module="${id}">${icon(iconName)}<span>${label}</span></button>`)
        .join("");
      $$("#nav button").forEach(button => button.addEventListener("click", () => {
        activeModule = button.dataset.module;
        $("#globalSearch").value = "";
        $("#searchResults").classList.add("hidden");
        renderApp();
      }));
    }

    function renderUser() {
      $("#userPill").innerHTML = `
        <div class="avatar">${escapeHtml(currentUser.name.slice(0, 1))}</div>
        <div>
          <strong>${escapeHtml(currentUser.name)}</strong>
          <span>${escapeHtml(roles[currentUser.role])}</span>
        </div>
      `;
    }

    function renderModule() {
      const renderers = {
        dashboard: renderDashboard,
        tasks: renderTasks,
        projects: renderProjects,
        kanban: renderKanban,
        planner: renderPlanner,
        eisenhower: renderEisenhower,
        clients: renderClients,
        production: renderProduction,
        finance: renderFinance,
        habits: renderHabits,
        team: renderTeam,
        reports: renderReports,
        settings: renderSettings
      };
      $("#module").innerHTML = renderers[activeModule]();
      attachModuleEvents();
    }

    function moduleHead(title, subtitle, actions = "") {
      const headClass = activeModule === "dashboard" ? "is-hero" : "is-compact";
      return `
        <div class="module-head ${headClass}">
          <div class="module-title">
            <h1>${title}</h1>
            <p>${subtitle}</p>
          </div>
          ${moduleTabs()}
          <div class="toolbar">${actions}</div>
        </div>
      `;
    }

    function moduleTabs() {
      return `
        <div class="app-tabs">
          ${modules.filter(([id]) => canAccess(id)).map(([id, label, iconName]) => `<button type="button" class="${activeModule === id ? "active" : ""}" data-module="${id}">${icon(iconName)}<span>${tabLabel(label)}</span></button>`).join("")}
        </div>
      `;
    }

    function tabLabel(label) {
      return {
        "Dashboard geral": "Dashboard",
        "Planner semanal": "Agenda",
        "Matriz de Eisenhower": "Matriz",
        "Hábitos / rotina": "Hábitos",
        "Equipe / funcionários": "Equipe",
        "Configurações": "Ajustes"
      }[label] || label;
    }

    function metric(label, value, note, iconName, tone = "") {
      return `
        <div class="metric">
          <div class="top"><span>${label}</span><span class="chip ${tone}">${icon(iconName)}</span></div>
          <strong>${value}</strong>
          <small>${note}</small>
        </div>
      `;
    }

    function renderDashboard() {
      const pending = visibleTasks().filter(task => task.status !== "Concluído" && task.status !== "Cancelado");
      const done = visibleTasks().filter(task => task.status === "Concluído");
      const activeProjects = db.projects.filter(project => !["Finalizado", "Cancelado"].includes(project.status));
      const late = pending.filter(task => task.dueDate && task.dueDate < today()).sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate)));
      const dueSoon = pending.filter(task => task.dueDate && task.dueDate >= today() && task.dueDate <= addDays(7)).sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate)));
      const todayName = currentWeekday();
      const todayQueue = pending
        .filter(task => task.dueDate === today() || (task.weekday || "Segunda") === todayName)
        .sort((a, b) => `${a.dueDate || "9999-99-99"} ${a.time || "99:99"}`.localeCompare(`${b.dueDate || "9999-99-99"} ${b.time || "99:99"}`));
      const focusQueue = (todayQueue.length ? todayQueue : dueSoon).slice(0, 6);
      const revenue = monthFinance("Receita");
      const expense = monthFinance("Despesa");
      const balance = revenue - expense;
      const habitDone = db.habits.filter(habit => isHabitDoneOn(habit, today())).length;
      const habitTotal = db.habits.length;
      return `
        ${moduleHead("Painel do dia", "Prioridades, agenda, projetos e saldo em uma única leitura.", "")}
        <div class="dashboard-stage">
          <div class="grid metrics">
            ${metric("Prioridades", pending.length, `${late.length} atrasadas • ${done.length} concluídas`, "check-square", pending.length ? "gold" : "success")}
            ${metric("Hoje", todayQueue.length, todayName, "calendar-days", todayQueue.length ? "accent" : "success")}
            ${metric("Hábitos", `${habitDone}/${habitTotal}`, "concluídos hoje", "repeat", habitTotal && habitDone === habitTotal ? "success" : "accent")}
            ${metric("Saldo previsto", money(balance), `${money(revenue)} receita • ${money(expense)} despesa`, "wallet", balance >= 0 ? "success" : "danger")}
          </div>
          <div class="grid two dashboard-row">
            <section class="panel dashboard-priority">
              <div class="section-title">
                <h2>Prioridades do dia</h2>
                <span class="chip accent">${dateText(today())}</span>
              </div>
              <div class="list">
                ${focusQueue.map(taskRow).join("") || emptyInline("Nenhuma prioridade para hoje.")}
              </div>
              <div class="dashboard-actions">
                <button class="btn accent" type="button" data-open="task" data-icon="plus">Nova tarefa</button>
                <button class="btn" type="button" data-module="planner" data-icon="calendar-days">Agenda</button>
                <button class="btn" type="button" data-module="kanban" data-icon="columns">Kanban</button>
              </div>
            </section>
            <section class="panel dashboard-pulse">
              <div class="section-title">
                <h2>Pulso da semana</h2>
                <span class="chip">${pending.length} abertas</span>
              </div>
              ${minimalLineChart(weeklyProductivity(), "tarefas", weekDays)}
              <div class="bar-chart">
                ${weekDays.map(day => {
                  const count = visibleTasks().filter(task => task.weekday === day).length;
                  const max = Math.max(1, ...weekDays.map(item => visibleTasks().filter(task => task.weekday === item).length));
                  return barRow(day, count, max, `${count} tarefa${count === 1 ? "" : "s"}`);
                }).join("")}
              </div>
            </section>
          </div>
          <div class="grid three dashboard-row">
            <section class="panel dashboard-compact-list">
              <div class="section-title"><h2>Projetos críticos</h2><button class="btn" type="button" data-open="project" data-icon="plus">Projeto</button></div>
              <div class="list">
                ${activeProjects.slice(0, 4).map(project => `
                  <div class="list-row">
                    <div>
                      <strong>${escapeHtml(project.name)}</strong>
                      <div class="meta"><span>${escapeHtml(getClientName(project.clientId))}</span><span>${escapeHtml(project.status)}</span><span>${dateText(project.dueDate)}</span></div>
                      <div class="progress" data-chart-tip="${escapeHtml(project.name)}|${Number(project.progress || 0)}% de progresso" style="--value:${Number(project.progress || 0)}%"><span></span></div>
                    </div>
                    <button class="btn icon" type="button" title="Editar" data-edit="project" data-id="${project.id}" data-icon="edit"></button>
                  </div>
                `).join("") || emptyInline("Nenhum projeto ativo.")}
              </div>
            </section>
            <section class="panel dashboard-compact-list">
              <div class="section-title"><h2>Rotina de hoje</h2><span class="chip accent">${habitDone}/${habitTotal}</span></div>
              <div class="list">
                ${db.habits.slice(0, 4).map(habit => {
                  const progress = Math.min(100, Math.round((Number(habit.streak || 0) / Math.max(1, Number(habit.target || 1))) * 100));
                  return `
                    <div class="list-row">
                      <div>
                        <strong>${escapeHtml(habit.name)}</strong>
                        <div class="meta">${escapeHtml(habit.frequency)} • ${habit.days?.join(", ") || "Sem dias"}</div>
                        <div class="progress" data-chart-tip="${escapeHtml(habit.name)}|${habit.streak || 0} de ${habit.target || 0} dias (${progress}%)" style="--value:${progress}%"><span></span></div>
                      </div>
                      <div class="row-actions">
                        ${isHabitDoneOn(habit, today()) ? checkOnly() : `<button class="btn icon" type="button" title="Concluir hoje" data-toggle-habit="${habit.id}" data-icon="check"></button>`}
                      </div>
                    </div>
                  `;
                }).join("") || emptyInline("Nenhum hábito programado.")}
              </div>
            </section>
            <section class="panel dashboard-compact-list">
              <div class="section-title"><h2>Alertas</h2><span class="chip gold">${late.length + dueSoon.length}</span></div>
              <div class="list">
                ${late.concat(dueSoon).slice(0, 4).map(taskRow).join("") || alerts().concat(db.activity).slice(0, 4).map(item => `
                  <div class="list-row">
                    <div>
                      <strong>${escapeHtml(item.label)}</strong>
                      <div class="meta">${dateText(item.date || today())}</div>
                    </div>
                  </div>
                `).join("") || emptyInline("Sem alertas.")}
              </div>
            </section>
          </div>
        </div>
      `;
    }

      if (!canManage()) return "";

        <button class="btn" type="button" data-open="task" data-icon="plus">Tarefa</button>
        <button class="btn" type="button" data-open="project" data-icon="plus">Projeto</button>
        <button class="btn" type="button" data-open="client" data-icon="plus">Cliente</button>
        <button class="btn" type="button" data-open="finance" data-icon="plus">Pagamento</button>

    function renderEisenhower() {

                  const tasks = visibleTasks().filter(task => (task.quadrant || "schedule") === id).slice(0, 2);

                  return `

                      <div class="column-list">
                        ${tasks.map(task => focusTask(task)).join("") || `<div class="empty">Vazio</div>`}

              <div class="kanban-focus-grid">
                ${["A fazer", "Em produção", "Finalizado"].map((column, index) => {
                  const tasks = visibleTasks().filter(task => (task.kanban || "A fazer") === column).slice(0, 2);

                      <div class="column-list">${tasks.map(task => focusTask(task)).join("") || `<div class="empty">Vazio</div>`}</div>

                  <button class="habit-day ${isHabitDoneOn(habit, day.iso) ? "done" : ""}" type="button" title="${escapeHtml(habit.name)} - ${dateText(day.iso)}" data-habit-day="${habit.id}|${day.iso}"></button>

                <div class="habit-mini-bar" title="${habit.streak || 0} dias">
                  ${Array.from({ length: 18 }, (_, index) => `<span style="--o:${index < Math.min(18, habit.streak || 0) ? 1 : 0.18}"></span>`).join("")}

    function renderReports() {
      const completed = visibleTasks().filter(task => task.status === "Concluído").length;
      const late = visibleTasks().filter(task => task.dueDate && task.dueDate < today() && task.status !== "Concluído").length;
      const finishedProjects = db.projects.filter(project => project.status === "Finalizado").length;
      const revenue = monthFinance("Receita");
      const expense = monthFinance("Despesa");
      const max = Math.max(completed, late, finishedProjects, revenue, expense, 1);
      const clientRows = db.clients.map(client => ({
        label: client.name,
        value: db.tasks.filter(task => task.clientId === client.id).length + db.projects.filter(project => project.clientId === client.id).length
      })).sort((a, b) => b.value - a.value).slice(0, 5);
      return `
        ${moduleHead("Relatórios", "Produtividade, atrasos, projetos, lucro, clientes ativos e custos.", '<button class="btn" type="button" data-export="pdf" data-icon="file-text">PDF</button>')}
        <div class="grid two">
          <div class="panel">
            <div class="section-title"><h2>Evolução mensal</h2><span class="chip accent">${money(revenue - expense)}</span></div>
            <div class="bar-chart">
              ${barRow("Tarefas concluídas", completed, max, completed)}
              ${barRow("Tarefas atrasadas", late, max, late)}
              ${barRow("Projetos finalizados", finishedProjects, max, finishedProjects)}
              ${barRow("Receita mensal", revenue, max, money(revenue))}
              ${barRow("Despesas mensais", expense, max, money(expense))}
            </div>
          </div>
          <div class="panel">
            <div class="section-title"><h2>Clientes mais ativos</h2><span class="chip gold">${clientRows.length}</span></div>
            <div class="bar-chart">
              ${clientRows.map(row => barRow(row.label, row.value, Math.max(1, ...clientRows.map(item => item.value)), row.value)).join("") || emptyInline("Sem dados de clientes.")}
            </div>
          </div>
        </div>
        <div class="grid two" style="margin-top:14px">
          <div class="panel">
            <div class="section-title"><h2>Custos por projeto</h2></div>
            <div class="bar-chart">
              ${db.projects.map(project => {
                const cost = sum(db.finance.filter(item => item.projectId === project.id && item.type === "Despesa").map(item => item.value));
                const maxCost = Math.max(1, ...db.projects.map(item => sum(db.finance.filter(fin => fin.projectId === item.id && fin.type === "Despesa").map(fin => fin.value))));
                return barRow(project.name, cost, maxCost, money(cost));
              }).join("") || emptyInline("Sem custos vinculados.")}
            </div>
          </div>
          <div class="panel">
            <div class="section-title"><h2>Funcionários</h2></div>
            <div class="bar-chart">
              ${db.team.map(employee => barRow(employee.name, calculateSalary(employee), Math.max(1, ...db.team.map(calculateSalary)), money(calculateSalary(employee)))).join("") || emptyInline("Sem dados de equipe.")}
            </div>
          </div>
        </div>
      `;
    }

    function plannerHour(task) {

      const clamped = Math.max(6, Math.min(18, Number.isFinite(hour) ? hour : 9));
      return `${String(clamped).padStart(2, "0")}:00`;

    function habitDays() {
      return Array.from({ length: 31 }, (_, index) => {
        const date = new Date();
        date.setDate(date.getDate() - (30 - index));
        const iso = date.toISOString().slice(0, 10);
        return { iso, day: String(date.getDate()).padStart(2, "0") };
      });
    }

    function isHabitDoneOn(habit, iso) {
      if (iso === today() && habit.doneToday) return true;
      return Boolean(habit.history?.some(item => item.date === iso && item.done));
    }

    function habitColor(id) {
      const colors = ["red", "blue", "gold", "green", "gray"];
      const score = String(id || "").split("").reduce((total, char) => total + char.charCodeAt(0), 0);

    }

    function minimalLineChart(values, label = "", labels = []) {
      const clean = values.length ? values.map(value => Number(value || 0)) : [0, 0, 0, 0, 0, 0, 0];
      const max = Math.max(1, ...clean);
      const min = Math.min(...clean);
      const spread = Math.max(1, max - min);
      const width = 320;
      const height = 150;
      const pad = 22;
      const points = clean.map((value, index) => {
        const x = pad + (index * ((width - pad * 2) / Math.max(1, clean.length - 1)));
        const y = height - pad - (((value - min) / spread) * (height - pad * 2));
        return [x, y, value];
      });
      const last = points[points.length - 1];
      return `
        <div class="minimal-chart" aria-label="Gráfico minimalista">
          <svg viewBox="0 0 ${width} ${height}" role="img">
            <line class="axis" x1="${pad}" y1="${height / 2}" x2="${width - pad}" y2="${height / 2}"></line>
            <polyline class="line" points="${points.map(point => `${point[0].toFixed(1)},${point[1].toFixed(1)}`).join(" ")}"></polyline>
            ${points.map((point, index) => `
              <g tabindex="0" data-chart-tip="${escapeHtml(labels[index] || `Ponto ${index + 1}`)}|${point[2]} ${escapeHtml(label)}">
                <circle class="dot" cx="${point[0].toFixed(1)}" cy="${point[1].toFixed(1)}" r="${index === points.length - 1 ? 5 : 3.5}"></circle>
                <circle class="hover-dot" cx="${point[0].toFixed(1)}" cy="${point[1].toFixed(1)}" r="16"></circle>
              </g>
            `).join("")}
            <text x="${Math.max(pad, last[0] - 6).toFixed(1)}" y="${Math.max(14, last[1] - 12).toFixed(1)}">${last[2]} ${escapeHtml(label)}</text>
          </svg>
        </div>
      `;
    }

    function sum(values) {
      return values.reduce((total, value) => total + Number(value || 0), 0);
    }

    function monthFinance(type) {
      const month = today().slice(0, 7);
      return sum(db.finance.filter(item => item.type === type && String(item.date || "").slice(0, 7) === month).map(item => item.value));
    }

    function budgetRows() {
      const defaults = [
        ["Alimentação", 900],
        ["Transporte", 400],
        ["Ferramentas", 1200],
        ["Equipe", 3500]
      ];
      return defaults.map(([category, limit]) => {
        const spent = sum(db.finance.filter(item => item.type === "Despesa" && (item.category || "").toLowerCase().includes(String(category).toLowerCase())).map(item => item.value));
        const fallback = spent || Math.round(Number(limit) * (category === "Ferramentas" ? 0.72 : category === "Equipe" ? 0.34 : 0.48));
        return { category, limit, spent: fallback, percent: Math.min(100, Math.round((fallback / Number(limit)) * 100)) };
      });
    }

    function avgProgress() {
      if (!db.projects.length) return 0;
      return Math.round(sum(db.projects.map(project => project.progress)) / db.projects.length);
    }

    function alerts() {
      const items = [];
      visibleTasks().forEach(task => {
        if (task.dueDate && task.dueDate < today() && task.status !== "Concluído") {
          items.push({ id: `late-${task.id}`, label: `Tarefa atrasada: ${task.title}`, date: task.dueDate });
        }
      });
      db.finance.forEach(item => {
        if (item.status === "Pendente" && item.date < today()) {
          items.push({ id: `fin-${item.id}`, label: `Pagamento atrasado: ${item.title}`, date: item.date });
        }
      });
      return items;
    }

    function calculateSalary(employee) {
      const salary = Number(employee.salary || 0);
      const advance = Number(employee.advance || 0);
      const absenceCount = Number(employee.absenceCount || 0);
      const daily = salary / 30;
      const shouldDiscountAbsence = employee.absenceReason === "Não justificada";
      return Math.max(0, salary - advance - (shouldDiscountAbsence ? daily * absenceCount : 0));
    }

    function attachChartTooltips() {
      $$("[data-chart-tip]").forEach(element => {
        if (element.dataset.tooltipBound === "true") return;
        element.dataset.tooltipBound = "true";
        element.setAttribute("tabindex", element.getAttribute("tabindex") || "0");
        element.addEventListener("mouseenter", event => showChartTooltip(event.currentTarget, event));
        element.addEventListener("mousemove", event => moveChartTooltip(event));
        element.addEventListener("mouseleave", hideChartTooltip);
        element.addEventListener("focus", event => showChartTooltip(event.currentTarget));
        element.addEventListener("blur", hideChartTooltip);
      });
    }

    function chartTooltipEl() {
      let tooltip = $("#chartTooltip");
      if (!tooltip) {
        tooltip = document.createElement("div");
        tooltip.id = "chartTooltip";
        tooltip.className = "chart-tooltip";
        document.body.appendChild(tooltip);
      }
      return tooltip;
    }

    function showChartTooltip(element, event = null) {
      const tooltip = chartTooltipEl();
      const [title, value] = String(element.dataset.chartTip || "").split("|");
      tooltip.innerHTML = `<strong>${escapeHtml(title || "Dado")}</strong><span>${escapeHtml(value || "")}</span>`;
      tooltip.classList.add("visible");
      if (event) {
        moveChartTooltip(event);
      } else {
        const rect = element.getBoundingClientRect();
        positionChartTooltip(rect.left + rect.width / 2, rect.top);
      }
    }

    function moveChartTooltip(event) {
      positionChartTooltip(event.clientX, event.clientY);
    }

    function positionChartTooltip(x, y) {
      const tooltip = chartTooltipEl();
      const safeX = Math.max(86, Math.min(window.innerWidth - 86, x));
      const safeY = Math.max(58, Math.min(window.innerHeight - 18, y));
      tooltip.style.left = `${safeX}px`;
      tooltip.style.top = `${safeY}px`;
    }

    function hideChartTooltip() {
      chartTooltipEl().classList.remove("visible");
    }

    function attachDragAndDrop() {
      $$("[data-task-card]").forEach(card => {
        card.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", card.dataset.taskCard);
          event.dataTransfer.effectAllowed = "move";
        });
      });
      $$("[data-drop-kanban], [data-drop-day], [data-drop-quadrant]").forEach(zone => {
        zone.addEventListener("dragover", event => {
          event.preventDefault();
          zone.classList.add("drag-over");
        });
        zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
        zone.addEventListener("drop", event => {
          event.preventDefault();
          zone.classList.remove("drag-over");
          const task = db.tasks.find(item => item.id === event.dataTransfer.getData("text/plain"));
          if (!task) return;
          if (zone.dataset.dropKanban) {
            task.kanban = zone.dataset.dropKanban;
            task.status = kanbanToStatus(task.kanban);
          }
          if (zone.dataset.dropDay) task.weekday = zone.dataset.dropDay;
          if (zone.dataset.dropQuadrant) task.quadrant = zone.dataset.dropQuadrant;
          logActivity(`Tarefa movida: ${task.title}`);
          saveDb();
          renderApp();
        });
      });
    }

      const task = visibleTasks().find(item => item.id === id);
      if (!task) return;
      const modalRoot = $("#modalRoot");
      modalRoot.innerHTML = `
        <dialog>
          <form class="modal" method="dialog" id="taskStatusForm">
            <div class="modal-head">
              <div>
                <h2>${escapeHtml(task.title)}</h2>
                <p class="muted">Status, anexo e comentário.</p>
              </div>

            </div>

              <div class="field"><label>Kanban</label><select name="kanban">${options(kanbanColumns, task.kanban || "A fazer")}</select></div>

            </div>

        task.kanban = String(formData.get("kanban"));
        task.completedAt = task.status === "Concluído" ? (task.completedAt || today()) : "";
        const attachment = fileName(formData, "attachment");
        if (attachment) task.attachmentName = attachment;
        const comment = String(formData.get("comment") || "").trim();
        if (comment) {
          task.comments ||= [];
          task.comments.unshift({ author: currentUser.name, text: comment, date: today() });

        logActivity(`Tarefa atualizada: ${task.title}`);
        saveDb();
        closeModal();
        renderApp();
      });

        ${field("Prazo", "dueDate", item.dueDate, "date")}
        ${field("Horário", "time", item.time || "09:00", "time")}
        <div class="field"><label>Prioridade</label><select name="priority">${options(priorityOptions, item.priority || "Média")}</select></div>
        <div class="field"><label>Status</label><select name="status">${options(statusOptions, item.status || "A fazer")}</select></div>
        <div class="field"><label>Kanban</label><select name="kanban">${options(kanbanColumns, item.kanban || "A fazer")}</select></div>
        <div class="field"><label>Planner</label><select name="weekday">${options(weekDays, item.weekday || "Segunda")}</select></div>
        <div class="field"><label>Matriz</label><select name="quadrant">${quadrants.map(([id, title]) => `<option value="${id}" ${id === (item.quadrant || "schedule") ? "selected" : ""}>${title}</option>`).join("")}</select></div>
        ${field("Tags separadas por vírgula", "tags", item.tags?.join(", "))}

        ${area("Descrição", "description", item.description, "wide")}

    function projectForm(item = {}) {
      return `
        ${field("Nome do projeto", "name", item.name, "text", true)}

        ${field("Data de início", "startDate", item.startDate, "date")}
        ${field("Prazo final", "dueDate", item.dueDate, "date")}
        <div class="field"><label>Status</label><select name="status">${options(projectStatus, item.status || "Planejamento")}</select></div>
        ${field("Responsável", "owner", item.owner || currentUser.name)}
        ${field("Progresso (%)", "progress", item.progress || 0, "number")}
        ${field("Orçamento", "budget", item.budget || 0, "number")}
        ${field("Arquivos / links", "files", item.files, "url")}

    function clientForm(item = {}) {
      return `
        ${field("Nome do cliente", "name", item.name, "text", true)}
        ${field("Empresa", "company", item.company)}
        ${field("Telefone", "phone", item.phone)}
        ${field("WhatsApp com DDI", "whatsapp", item.whatsapp)}
        ${field("E-mail", "email", item.email, "email")}
        ${field("Endereço", "address", item.address)}

      `;
    }

    function financeForm(item = {}) {
      return `
        ${field("Nome do lançamento", "title", item.title, "text", true)}
        <div class="field"><label>Tipo</label><select name="type">${options(["Receita", "Despesa"], item.type || "Receita")}</select></div>
        ${field("Categoria", "category", item.category)}
        ${field("Valor", "value", item.value || 0, "number", true)}
        ${field("Data", "date", item.date || today(), "date")}
        <div class="field"><label>Cliente</label><select name="clientId">${clientOptions(item.clientId)}</select></div>
        <div class="field"><label>Projeto</label><select name="projectId">${projectOptions(item.projectId)}</select></div>
        <div class="field"><label>Status</label><select name="status">${options(["Pago", "Pendente", "Atrasado"], item.status || "Pendente")}</select></div>
        ${field("Comprovante", "attachment", "", "file")}
        ${area("Observações", "notes", item.notes, "wide")}

    function productionForm(item = {}) {
      return `
        <div class="field"><label>Tipo de produção</label><select name="type">${options(productionTypes, item.type || "Vídeo")}</select></div>
        <div class="field"><label>Cliente</label><select name="clientId">${clientOptions(item.clientId)}</select></div>
        ${field("Responsável", "responsible", item.responsible || currentUser.name)}
        ${field("Data de captação", "captureDate", item.captureDate, "date")}
        ${field("Data de edição", "editDate", item.editDate, "date")}
        ${field("Data de entrega", "deliveryDate", item.deliveryDate, "date")}
        <div class="field"><label>Status</label><select name="status">${options(["A fazer", "Em produção", "Revisão", "Aguardando aprovação", "Concluído"], item.status || "A fazer")}</select></div>
        ${field("Link do arquivo", "fileLink", item.fileLink, "url")}
        <div class="field"><label>Aprovação do cliente</label><select name="approval">${options(["Pendente", "Aprovado", "Ajustes solicitados"], item.approval || "Pendente")}</select></div>
        ${area("Descrição", "description", item.description, "wide")}
        ${area("Checklist de produção", "checklist", item.checklist?.join("\\n"), "wide")}
        ${area("Observações", "notes", item.notes, "wide")}
      `;
    }

    function habitForm(item = {}) {
      return `
        ${field("Nome do hábito", "name", item.name, "text", true)}
        ${field("Frequência", "frequency", item.frequency || "Diária")}
        ${field("Dias da semana", "days", item.days?.join(", ") || "Segunda, Terça, Quarta, Quinta, Sexta")}
        ${field("Meta", "target", item.target || 30, "number")}
        ${field("Sequência atual", "streak", item.streak || 0, "number")}
        ${field("Melhor sequência", "bestStreak", item.bestStreak || 0, "number")}
      `;
    }

    function employeeForm(item = {}) {
      return `
        ${field("Nome", "name", item.name, "text", true)}
        ${field("Função", "roleName", item.roleName)}
        ${field("Salário combinado", "salary", item.salary || 0, "number", true)}
        ${field("Faltas", "absenceCount", item.absenceCount || 0, "number")}
        <div class="field"><label>Motivo da falta</label><select name="absenceReason">${options(["Nenhuma", "Doença", "Não justificada", "Pessoal"], item.absenceReason || "Nenhuma")}</select></div>
        ${field("Atestado médico", "certificate", "", "file")}
        ${field("Vales registrados", "advance", item.advance || 0, "number")}
        ${field("Comprovante de pagamento", "paymentProof", "", "file")}
        ${area("Histórico de ocorrências", "notes", item.notes, "wide")}
      `;
    }

    function field(label, name, value = "", type = "text", required = false) {
      return `<div class="field"><label>${label}</label><input name="${name}" type="${type}" value="${escapeHtml(value)}" ${required ? "required" : ""}></div>`;
    }

    function area(label, name, value = "", className = "") {
      return `<div class="field ${className}"><label>${label}</label><textarea name="${name}">${escapeHtml(value)}</textarea></div>`;
    }

    function fileName(formData, name) {
      const file = formData.get(name);
      return file && file.name ? file.name : "";
    }

    function saveEntity(entity, id, formData) {
      const existing = findEntity(entity, id);
      const data = Object.fromEntries(formData.entries());
      const file = fileName(formData, "attachment");
      const certificate = fileName(formData, "certificate");
      const paymentProof = fileName(formData, "paymentProof");

      if (entity === "employee" && Number(data.absenceCount || 0) > 0 && data.absenceReason === "Doença" && !certificate && !existing?.certificateName) {
        alert("Para falta por doença, anexe o atestado médico.");
        return;
      }

      const builders = {
        task: () => ({
          title: data.title,
          description: data.description,
          category: data.category,
          subcategory: data.subcategory,
          projectId: data.projectId,
          clientId: data.clientId,
          assignee: data.assignee,
          dueDate: data.dueDate,
          time: data.time || "09:00",
          priority: data.priority,
          status: data.status,
          kanban: data.kanban,
          quadrant: data.quadrant,
          weekday: data.weekday,
          tags: splitList(data.tags),
          checklist: splitLines(data.checklist).map((text, index) => ({ text, done: existing?.checklist?.[index]?.done || false })),
          comments: existing?.comments || [],
          createdAt: existing?.createdAt || today(),
          completedAt: data.status === "Concluído" ? (existing?.completedAt || today()) : "",
          attachmentName: file || existing?.attachmentName || ""
        }),
        project: () => ({ name: data.name, clientId: data.clientId, description: data.description, startDate: data.startDate, dueDate: data.dueDate, status: data.status, owner: data.owner, progress: clamp(data.progress, 0, 100), budget: Number(data.budget || 0), files: data.files, history: existing?.history || [] }),
        client: () => ({ name: data.name, company: data.company, phone: data.phone, whatsapp: data.whatsapp, email: data.email, address: data.address, notes: data.notes }),
        finance: () => ({ title: data.title, type: data.type, category: data.category, value: Number(data.value || 0), date: data.date, clientId: data.clientId, projectId: data.projectId, status: data.status, notes: data.notes, attachmentName: file || existing?.attachmentName || "" }),
        production: () => ({ type: data.type, clientId: data.clientId, description: data.description, responsible: data.responsible, captureDate: data.captureDate, editDate: data.editDate, deliveryDate: data.deliveryDate, status: data.status, fileLink: data.fileLink, approval: data.approval, notes: data.notes, checklist: splitLines(data.checklist) }),
        habit: () => ({ name: data.name, frequency: data.frequency, days: splitList(data.days), target: Number(data.target || 0), streak: Number(data.streak || 0), bestStreak: Number(data.bestStreak || 0), doneToday: existing?.doneToday || false, history: existing?.history || [] }),
        employee: () => ({ name: data.name, roleName: data.roleName, salary: Number(data.salary || 0), absenceCount: Number(data.absenceCount || 0), absenceReason: data.absenceReason, certificateName: certificate || existing?.certificateName || "", advance: Number(data.advance || 0), paymentProof: paymentProof || existing?.paymentProof || "", notes: data.notes })
      };
      const record = { id: existing?.id || uid(entity), ...builders[entity]() };
      const collection = collectionFor(entity);
      if (existing) {
        const index = collection.findIndex(item => item.id === id);
        collection[index] = record;
        logActivity(`${entityLabel(entity)} atualizado: ${record.title || record.name || record.type}`);
      } else {
        collection.unshift(record);
        logActivity(`${entityLabel(entity)} criado: ${record.title || record.name || record.type}`);
      }
      saveDb();
      closeModal();
      renderApp();
    }

    function collectionFor(entity) {
      return {
        task: db.tasks,
        project: db.projects,
        client: db.clients,
        finance: db.finance,
        production: db.productions,
        habit: db.habits,
        employee: db.team
      }[entity];
    }

    function splitList(value) {
      return String(value || "").split(",").map(item => item.trim()).filter(Boolean);
    }

    function splitLines(value) {
      return String(value || "").split("\\n").map(item => item.trim()).filter(Boolean);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, Number(value || 0)));
    }

    function deleteEntity(entity, id) {
      if (!canManage() && entity !== "habit") return;
      if (!confirm("Excluir este registro?")) return;
      const collection = collectionFor(entity);
      const item = collection.find(record => record.id === id);
      const index = collection.findIndex(record => record.id === id);
      if (index >= 0) collection.splice(index, 1);
      logActivity(`${entityLabel(entity)} excluído: ${item?.title || item?.name || item?.type || "registro"}`);
      saveDb();
      renderApp();
    }

    function completeTask(id) {
      const task = db.tasks.find(item => item.id === id);
      if (!task) return;
      task.status = "Concluído";
      task.kanban = "Finalizado";
      task.completedAt = today();
      logActivity(`Tarefa concluída: ${task.title}`);
      saveDb();
      renderApp();
    }

    function toggleHabit(id) {
      const habit = db.habits.find(item => item.id === id);
      if (!habit) return;
      setHabitDate(habit, today(), !isHabitDoneOn(habit, today()));
      logActivity(`${habit.doneToday ? "Hábito concluído" : "Hábito reaberto"}: ${habit.name}`);
      saveDb();
      renderApp();
    }

    function toggleHabitDay(value) {
      const [id, iso] = String(value || "").split("|");
      const habit = db.habits.find(item => item.id === id);
      if (!habit || !iso) return;
      setHabitDate(habit, iso, !isHabitDoneOn(habit, iso));
      logActivity(`Hábito atualizado: ${habit.name}`);
      saveDb();
      renderApp();
    }

    function setHabitDate(habit, iso, done) {
      habit.history ||= [];
      habit.history = habit.history.filter(item => item.date !== iso);
      habit.history.unshift({ date: iso, done });
      if (iso === today()) habit.doneToday = done;
      habit.streak = calculateHabitStreak(habit);
      habit.bestStreak = Math.max(Number(habit.bestStreak || 0), Number(habit.streak || 0));
    }

    function calculateHabitStreak(habit) {
      let streak = 0;
      for (let offset = 0; offset < 365; offset++) {
        const date = new Date();
        date.setDate(date.getDate() - offset);
        const iso = date.toISOString().slice(0, 10);
        if (isHabitDoneOn(habit, iso)) streak++;
        else break;
      }
      return streak;
    }

    function toggleTheme() {
      const next = document.body.dataset.theme === "dark" ? "light" : "dark";
      setTheme(next);
    }

    function setTheme(theme) {
      const next = theme === "light" ? "light" : "dark";
      document.body.dataset.theme = next;
      db.theme = next;
      saveDb();
      renderApp();
    }

    function saveProfileSettings(event) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      currentUser.gender = String(formData.get("gender") || "neutral");
      users = users.map(user => user.id === currentUser.id ? { ...user, gender: currentUser.gender } : user);
      saveUsers();
      saveDb();
      renderApp();
    }

    function saveCalendarSettings(event) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      db.calendar ||= { googleClientId: "", connected: false, lastSync: "" };
      db.calendar.googleClientId = String(formData.get("googleClientId") || "").trim();
      db.calendar.connected = Boolean(db.calendar.googleClientId);
      db.calendar.lastSync = db.calendar.connected ? new Date().toISOString() : "";
      logActivity(db.calendar.connected ? "Google Calendar configurado" : "Google Calendar desconectado");
      saveDb();
      renderApp();
    }

    async function createUser(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const formData = new FormData(form);
      const name = String(formData.get("name") || "").trim();
      const email = String(formData.get("email")).trim().toLowerCase();
      const plainPassword = String(formData.get("password"));
      if (!name || !email || !plainPassword) {
        alert("Preencha nome, e-mail e senha para criar o login.");
        return;
      }
      if (users.some(user => user.email.toLowerCase() === email)) {
        alert("Este e-mail já existe.");
        return;
      }
      const user = {
        id: uid("user"),
        name,
        email,
        passwordHash: await sha256(plainPassword),
        plainPassword,
        passwordUpdatedAt: today(),
        gender: String(formData.get("gender") || "neutral"),
        role: String(formData.get("role")),
        status: "Ativo",
        createdAt: today(),
        lastLogin: ""
      };
      users.push(user);
      if (!saveUsers()) {
        users = users.filter(item => item.id !== user.id);
        return;
      }
      try {
        localStorage.setItem(dbKey(user.id), JSON.stringify(createDefaultDb(false)));
      } catch (error) {
        console.error(error);
      }
      accessNotice = `Login criado e salvo: ${user.email}`;
      logActivity(`Login criado: ${user.email}`);
      saveDb();
      form.reset();
      renderApp();
    }

    function revealUserPassword(id) {
      const user = users.find(item => item.id === id);
      if (!user || user.email === ADMIN_EMAIL) return;
      if (user.plainPassword) {
        alert(`Senha de ${user.email}: ${user.plainPassword}`);
        return;
      }
      const shouldReset = confirm("Essa senha antiga está protegida por hash e não pode ser revelada. Deseja alterar a senha agora para passar a visualizar a nova?");
      if (shouldReset) changeUserPassword(id);
    }

    async function changeUserPassword(id) {
      const user = users.find(item => item.id === id);
      if (!user || user.email === ADMIN_EMAIL) return;
      const newPassword = prompt(`Nova senha para ${user.email}:`);
      if (newPassword === null) return;
      if (newPassword.length < 6) {
        alert("Use uma senha com pelo menos 6 caracteres.");
        return;
      }
      user.passwordHash = await sha256(newPassword);
      user.plainPassword = newPassword;
      user.passwordUpdatedAt = today();
      saveUsers();
      alert("Senha atualizada. Agora ela poderá ser visualizada pelo botão Ver.");
      renderApp();
    }

    function toggleUser(id) {
      const user = users.find(item => item.id === id);
      if (!user || user.email === ADMIN_EMAIL) return;
      user.status = user.status === "Inativo" ? "Ativo" : "Inativo";
      saveUsers();
      renderApp();
    }

    function setUserStatus(id, status) {
      const user = users.find(item => item.id === id);
      if (!user || user.email === ADMIN_EMAIL) return;
      user.status = status;
      saveUsers();
      renderApp();
    }

    function removeUser(id) {
      const user = users.find(item => item.id === id);
      if (!user || user.email === ADMIN_EMAIL) return;
      if (!confirm("Remover este login e seu banco de dados local?")) return;
      users = users.filter(item => item.id !== id);
      localStorage.removeItem(dbKey(id));
      saveUsers();
      renderApp();
    }

    function renderSearch() {
      const term = $("#globalSearch").value.trim().toLowerCase();
      const root = $("#searchResults");
      if (term.length < 2) {
        root.classList.add("hidden");
        return;
      }
      const hits = [
        ...visibleTasks().map(item => ({ module: "tasks", icon: "check-square", title: item.title, meta: getClientName(item.clientId) })),
        ...db.projects.map(item => ({ module: "projects", icon: "folder-kanban", title: item.name, meta: getClientName(item.clientId) })),
        ...db.clients.map(item => ({ module: "clients", icon: "users", title: item.name, meta: item.company })),
        ...db.finance.map(item => ({ module: "finance", icon: "wallet", title: item.title, meta: money(item.value) })),
        ...db.productions.map(item => ({ module: "production", icon: "clapperboard", title: item.type, meta: getClientName(item.clientId) }))
      ].filter(item => `${item.title} ${item.meta}`.toLowerCase().includes(term)).slice(0, 8);
      root.innerHTML = hits.map(item => `
        <button class="search-hit" type="button" data-search-module="${item.module}">
          ${icon(item.icon)}
          <span><strong>${escapeHtml(item.title)}</strong><span class="meta">${escapeHtml(item.meta || "")}</span></span>
          <span class="chip">${modules.find(([id]) => id === item.module)?.[1] || ""}</span>
        </button>
      `).join("") || `<div class="empty">Nada encontrado</div>`;
      root.classList.remove("hidden");
      $$("[data-search-module]", root).forEach(button => button.addEventListener("click", () => {
        activeModule = button.dataset.searchModule;
        root.classList.add("hidden");
        renderApp();
      }));
    }

    function handleExport(type) {
      if (type === "pdf") {
        window.print();
        return;
      }
      if (type === "ics") {
        download(`nexor-agenda-${today()}.ics`, buildIcs(), "text/calendar;charset=utf-8");
        return;
      }
      if (type === "backup") {
        download(`nexor-backup-${currentUser.email}-${today()}.json`, JSON.stringify({ user: currentUser.email, db }, null, 2), "application/json");
        return;
      }
      const rows = [["Nome", "Tipo", "Categoria", "Valor", "Data", "Cliente", "Projeto", "Status"]];
      db.finance.forEach(item => rows.push([item.title, item.type, item.category, item.value, item.date, getClientName(item.clientId), getProjectName(item.projectId), item.status]));
      const csv = rows.map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(";")).join("\\n");
      download(`nexor-financeiro-${today()}.csv`, csv, "text/csv;charset=utf-8");
    }

    function buildIcs() {
      const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
      const events = visibleTasks().filter(task => task.dueDate).map(task => {
        const start = `${task.dueDate.replace(/-/g, "")}T${String(task.time || "09:00").replace(":", "")}00`;
        const endHour = String(Math.min(23, Number(String(task.time || "09:00").slice(0, 2)) + 1)).padStart(2, "0");
        const end = `${task.dueDate.replace(/-/g, "")}T${endHour}${String(task.time || "09:00").slice(3, 5)}00`;
        return [
          "BEGIN:VEVENT",
          `UID:${task.id}@nexor.local`,
          `DTSTAMP:${stamp}`,
          `DTSTART:${start}`,
          `DTEND:${end}`,
          `SUMMARY:${icsEscape(task.title)}`,
          `DESCRIPTION:${icsEscape([task.description, getClientName(task.clientId), getProjectName(task.projectId)].filter(Boolean).join(" | "))}`,
          "END:VEVENT"
        ].join("\r\n");
      }).join("\r\n");
      return ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Nexor//Agenda//PT-BR", events, "END:VCALENDAR"].join("\r\n");
    }

    function icsEscape(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
    }

    function connectGoogleCalendar() {
      db.calendar ||= { googleClientId: "", connected: false, lastSync: "" };
      if (!db.calendar.googleClientId) {
        alert("Para conexão OAuth real, informe o Google OAuth Client ID em Configurações. Enquanto isso, use a exportação .ics ou o botão Abrir Google.");
        activeModule = "settings";
        renderApp();
        return;
      }
      db.calendar.connected = true;
      db.calendar.lastSync = new Date().toISOString();
      logActivity("Google Calendar preparado para conexão");
      saveDb();
      alert("Client ID salvo. Em uma publicação web com origem autorizada no Google Cloud, esta tela já fica pronta para iniciar o fluxo OAuth.");
      renderApp();
    }

    function openGoogleCalendar() {
      const nextTask = visibleTasks().find(task => task.dueDate) || {};
      const start = `${String(nextTask.dueDate || today()).replace(/-/g, "")}T${String(nextTask.time || "09:00").replace(":", "")}00`;
      const end = `${String(nextTask.dueDate || today()).replace(/-/g, "")}T${String(Math.min(23, Number(String(nextTask.time || "09:00").slice(0, 2)) + 1)).padStart(2, "0")}${String(nextTask.time || "09:00").slice(3, 5)}00`;
      const url = new URL("https://calendar.google.com/calendar/render");
      url.searchParams.set("action", "TEMPLATE");
      url.searchParams.set("text", nextTask.title || "Evento Nexor");
      url.searchParams.set("dates", `${start}/${end}`);
      url.searchParams.set("details", nextTask.description || "Criado no Nexor");
      window.open(url.toString(), "_blank", "noopener,noreferrer");
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function updateNotificationDot() {
      if (!db) return;
      const hasUnread = alerts().length > 0 || db.activity.some(item => !db.notificationsReadAt || new Date(item.date) > new Date(db.notificationsReadAt));
      $("#notifyDot").classList.toggle("hidden", !hasUnread);
    }

    boot();
  </script>
